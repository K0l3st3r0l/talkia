<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TalkIA — Walkie-talkie</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0A0A1A;
    color: #E0E0E0;
    font-family: system-ui, sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Join ── */
  #join {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    width: 100%;
    max-width: 320px;
  }
  .logo {
    width: 90px; height: 90px;
    border-radius: 50%;
    background: #1A1A2E;
    border: 2px solid #00BCD4;
    display: flex; align-items: center; justify-content: center;
  }
  .logo svg { width: 44px; height: 44px; fill: #00BCD4; }
  h1 { font-size: 32px; font-weight: 700; letter-spacing: 4px; color: #fff; }
  .subtitle { font-size: 13px; color: #666; }

  input[type=text], input[type=password] {
    width: 100%;
    background: #1A1A2E;
    border: 1px solid #444;
    border-radius: 12px;
    color: #fff;
    outline: none;
    padding: 12px 14px;
    font-size: 15px;
  }
  input[type=text]:focus, input[type=password]:focus { border-color: #00BCD4; border-width: 2px; }
  input::placeholder { color: #444; }
  #room-input {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 6px;
    text-align: center;
    text-transform: uppercase;
    padding: 14px;
  }
  #room-input::placeholder { font-size: 13px; letter-spacing: 3px; font-weight: 400; }

  #password-wrap {
    width: 100%;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.25s ease;
  }
  #password-wrap.visible { max-height: 60px; }

  .btn-primary {
    width: 100%;
    background: #00BCD4;
    color: #000;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 3px;
    border: none;
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    margin-top: 4px;
  }
  .hint { font-size: 12px; color: #555; text-align: center; line-height: 1.6; }

  /* ── Radio ── */
  #radio {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 400px;
    height: 100dvh;
  }
  .topbar {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: #1A1A2E;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  #btn-back { background: none; border: none; color: #666; cursor: pointer; font-size: 20px; padding: 4px; }
  .room-label { font-size: 11px; color: #666; letter-spacing: 2px; }
  .room-code { font-size: 14px; font-weight: 700; color: #00BCD4; letter-spacing: 3px; }
  .topbar-right { display: flex; align-items: center; gap: 8px; }
  #btn-mute { background: none; border: none; color: #666; cursor: pointer; font-size: 20px; padding: 4px; }
  #btn-mute.muted { color: #FF5252; }
  .user-count { display: flex; align-items: center; gap: 4px; font-size: 14px; font-weight: 700; color: #666; }
  .user-count svg { width: 14px; height: 14px; fill: #666; }

  .status-bar {
    width: 100%;
    padding: 8px;
    background: #1A1A2E;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #555; }

  /* Users row */
  #users-row {
    width: 100%;
    padding: 8px 12px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    min-height: 36px;
  }
  #users-row::-webkit-scrollbar { display: none; }
  .user-chip {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 20px;
    background: #1A1A2E;
    border: 1.5px solid transparent;
    font-size: 12px;
    color: #888;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .user-chip.me { border-color: rgba(0,188,212,0.5); color: #00BCD4; }
  .user-chip.speaking { background: rgba(76,175,80,0.15); border-color: #4CAF50; color: #4CAF50; font-weight: 700; }
  .user-chip .mic-icon { font-size: 10px; }

  .main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    width: 100%;
  }

  .ptt-wrap { position: relative; width: 180px; height: 180px; display: flex; align-items: center; justify-content: center; }
  .ptt-rings { position: absolute; inset: 0; border-radius: 50%; pointer-events: none; }
  .ptt-ring { position: absolute; border-radius: 50%; border: 2px solid currentColor; opacity: 0; top: 50%; left: 50%; transform: translate(-50%, -50%); }
  #ptt {
    width: 160px; height: 160px; border-radius: 50%;
    background: rgba(85,85,85,0.15); border: 2px solid #555;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; position: relative; z-index: 1;
    user-select: none; -webkit-user-select: none; transition: all 0.2s;
  }
  #ptt svg { width: 72px; height: 72px; fill: #555; transition: fill 0.2s; }
  #ptt.transmitting { background: rgba(255,82,82,0.15); border-color: #FF5252; border-width: 4px; box-shadow: 0 0 30px rgba(255,82,82,0.4); }
  #ptt.transmitting svg { fill: #FF5252; }
  #ptt.receiving { background: rgba(76,175,80,0.15); border-color: #4CAF50; border-width: 4px; box-shadow: 0 0 30px rgba(76,175,80,0.4); }
  #ptt.receiving svg { fill: #4CAF50; }
  #ptt.connected { background: rgba(0,188,212,0.15); border-color: #00BCD4; }
  #ptt.connected svg { fill: #00BCD4; }

  @keyframes ring-out {
    0%   { width: 160px; height: 160px; opacity: 0.5; }
    100% { width: 260px; height: 260px; opacity: 0; }
  }
  .ptt-ring.active { animation: ring-out 1.2s ease-out infinite; }
  .ptt-ring:nth-child(2).active { animation-delay: 0.4s; }
  .ptt-ring:nth-child(3).active { animation-delay: 0.8s; }

  .ptt-hint { font-size: 11px; letter-spacing: 2px; color: #555; text-align: center; min-height: 18px; }

  /* Volume */
  .volume-row { display: flex; align-items: center; gap: 8px; width: 100%; padding: 0 24px; }
  .volume-row span { font-size: 11px; color: #555; min-width: 36px; text-align: right; }
  .volume-row svg { width: 18px; height: 18px; fill: #555; flex-shrink: 0; }
  input[type=range] { flex: 1; -webkit-appearance: none; height: 4px; border-radius: 2px; background: #1A1A2E; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #00BCD4; cursor: pointer; }

  .footer { padding-bottom: 16px; font-size: 12px; color: #444; }

  /* OTA banner */
  #ota-banner {
    display: none;
    width: 100%;
    background: rgba(0,188,212,0.12);
    border-bottom: 1px solid rgba(0,188,212,0.3);
    padding: 8px 16px;
    text-align: center;
    font-size: 11px;
    color: #00BCD4;
    letter-spacing: 1px;
    cursor: pointer;
    gap: 6px;
    align-items: center;
    justify-content: center;
  }
  #ota-banner.visible { display: flex; }

  /* App download link in join */
  .app-download { font-size: 11px; color: #444; text-align: center; margin-top: 4px; }
  .app-download a { color: #00BCD4; text-decoration: none; }
  .app-download a:hover { text-decoration: underline; }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 100; }
  .overlay.visible { display: flex; }
  .dialog { background: #1A1A2E; border-radius: 16px; padding: 24px; max-width: 300px; width: 90%; }
  .dialog h3 { color: #fff; margin-bottom: 10px; }
  .dialog p { color: #888; font-size: 14px; line-height: 1.5; margin-bottom: 20px; }
  .dialog-buttons { display: flex; gap: 12px; justify-content: flex-end; }
  .btn-cancel { background: none; border: none; color: #888; font-size: 13px; letter-spacing: 1px; cursor: pointer; padding: 8px 12px; }
  .btn-confirm { background: none; border: none; color: #FF5252; font-size: 13px; font-weight: 700; letter-spacing: 1px; cursor: pointer; padding: 8px 12px; }

  #toast { display: none; position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: #FF5252; color: #fff; font-size: 13px; padding: 12px 20px; border-radius: 8px; z-index: 200; max-width: 90%; text-align: center; }
</style>
</head>
<body>

<!-- Join screen -->
<div id="join">
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/></svg>
  </div>
  <h1>TalkIA</h1>
  <p class="subtitle">Walkie-talkie digital</p>

  <input type="text" id="name-input" maxlength="24" placeholder="Tu nombre" autocomplete="off" autocorrect="off" spellcheck="false">
  <input type="text" id="room-input" maxlength="12" placeholder="CÓDIGO DE SALA" autocomplete="off" autocorrect="off" spellcheck="false">

  <div id="password-wrap">
    <input type="password" id="password-input" maxlength="64" placeholder="Contraseña de admin (solo para crear sala)" autocomplete="off">
  </div>

  <button class="btn-primary" id="btn-join">CONECTAR</button>
  <p class="hint">Todos los dispositivos en el mismo código<br>pueden escucharse entre sí</p>
  <p class="app-download" id="app-download-link">
    📲 <a href="https://ota.laravas.com/talkia-latest.apk" id="apk-link">Descargar app Android</a>
  </p>
</div>

<!-- Radio screen -->
<div id="radio">
  <div class="topbar">
    <div class="topbar-left">
      <button id="btn-back">‹</button>
      <div>
        <div class="room-label">SALA</div>
        <div class="room-code" id="display-room"></div>
      </div>
    </div>
    <div class="topbar-right">
      <button id="btn-mute" title="Silenciar">🔊</button>
      <div class="user-count">
        <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
        <span id="user-count">1</span>
      </div>
    </div>
  </div>

  <div id="ota-banner">
    <span>📲</span>
    <span id="ota-banner-text">Nueva versión disponible</span>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">CONECTANDO...</span>
  </div>

  <div id="users-row"></div>

  <div class="main-area">
    <div class="ptt-wrap">
      <div class="ptt-rings">
        <div class="ptt-ring" id="ring1"></div>
        <div class="ptt-ring" id="ring2"></div>
        <div class="ptt-ring" id="ring3"></div>
      </div>
      <div id="ptt">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/></svg>
      </div>
    </div>
    <p class="ptt-hint" id="ptt-hint"></p>
  </div>

  <div class="volume-row">
    <svg viewBox="0 0 24 24"><path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5zm7-.17v6.34L9.83 13H7v-2h2.83L12 8.83z"/></svg>
    <input type="range" id="volume-slider" min="0" max="100" value="100">
    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    <span id="volume-pct">100%</span>
  </div>

  <div class="footer" id="footer">Solo tú en la sala</div>
</div>

<div class="overlay" id="overlay">
  <div class="dialog">
    <h3>¿Salir de la sala?</h3>
    <p id="dialog-msg"></p>
    <div class="dialog-buttons">
      <button class="btn-cancel" id="btn-cancel">CANCELAR</button>
      <button class="btn-confirm" id="btn-confirm-exit">SALIR</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const WS_BASE = 'wss://talkia.laravas.com/ws';
const OTA_VERSION_URL = 'https://ota.laravas.com/talkia/version.json';
const OTA_APK_URL = 'https://ota.laravas.com/talkia-latest.apk';
const DEFAULT_ROOM = '76961';
const SAMPLE_RATE = 16000;

let ws = null;
let roomCode = '';
let roomPassword = '';
let myName = '';
let state = 'disconnected';
let userCount = 1;
let users = [];
let currentSpeaker = null;
let muted = false;
let transmitting = false;
let reconnectAllowed = true;
let volume = 1.0;

let otaBuild = 0;
let otaCheckInterval = null;

const otaBanner = document.getElementById('ota-banner');
const otaBannerText = document.getElementById('ota-banner-text');
const apkLink = document.getElementById('apk-link');

async function checkOta() {
  try {
    const res = await fetch(OTA_VERSION_URL + '?t=' + Date.now());
    const data = await res.json();
    const build = data.build || 0;
    const url = data.url || OTA_APK_URL;
    apkLink.href = url;
    if (build !== otaBuild) {
      otaBuild = build;
      if (apkLink) apkLink.textContent = `Descargar app Android (build ${build})`;
    }
    // Show OTA banner in radio screen if update is available
    if (radioEl.style.display !== 'none' && build > 0) {
      otaBannerText.textContent = `Nueva versión Android disponible (build ${build}) — toca para descargar`;
      otaBanner.classList.add('visible');
    }
  } catch(_) {}
}

otaBanner.addEventListener('click', () => {
  window.open(apkLink.href || OTA_APK_URL, '_blank');
});

let audioCtx = null;
let gainNode = null;
let mediaStream = null;
let scriptProcessor = null;
let playTime = 0;

const joinEl        = document.getElementById('join');
const radioEl       = document.getElementById('radio');
const nameInput     = document.getElementById('name-input');
const roomInput     = document.getElementById('room-input');
const passwordInput = document.getElementById('password-input');
const passwordWrap  = document.getElementById('password-wrap');
const btnJoin       = document.getElementById('btn-join');
const btnBack       = document.getElementById('btn-back');
const btnMute       = document.getElementById('btn-mute');
const ptt           = document.getElementById('ptt');
const statusDot     = document.getElementById('status-dot');
const statusTxt     = document.getElementById('status-text');
const displayRoom   = document.getElementById('display-room');
const userCountEl   = document.getElementById('user-count');
const footerEl      = document.getElementById('footer');
const pttHint       = document.getElementById('ptt-hint');
const usersRow      = document.getElementById('users-row');
const overlay       = document.getElementById('overlay');
const ring1         = document.getElementById('ring1');
const ring2         = document.getElementById('ring2');
const ring3         = document.getElementById('ring3');
const volumeSlider  = document.getElementById('volume-slider');
const volumePct     = document.getElementById('volume-pct');
const toastEl       = document.getElementById('toast');

// Toast
let toastTimer = null;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toastEl.style.display = 'none'; }, 4000);
}

// Password field visibility
function updatePasswordVisibility() {
  const code = roomInput.value.trim().toUpperCase();
  passwordWrap.classList.toggle('visible', code !== DEFAULT_ROOM && code.length > 0);
  if (code === DEFAULT_ROOM) passwordInput.value = '';
}
roomInput.addEventListener('input', () => {
  roomInput.value = roomInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
  updatePasswordVisibility();
});

// Users chips
function renderUsers() {
  usersRow.innerHTML = '';
  users.forEach(name => {
    const chip = document.createElement('div');
    chip.className = 'user-chip' +
      (name === myName ? ' me' : '') +
      (name === currentSpeaker ? ' speaking' : '');
    chip.innerHTML = name === currentSpeaker
      ? `<span class="mic-icon">🎙</span>${name === myName ? name + ' (tú)' : name}`
      : (name === myName ? name + ' (tú)' : name);
    usersRow.appendChild(chip);
  });
}

// State
function setState(s) {
  state = s;
  const colors = { disconnected:'#555', connecting:'#888', connected:'#00BCD4', transmitting:'#FF5252', receiving:'#4CAF50' };
  const labels = { disconnected:'DESCONECTADO', connecting:'CONECTANDO...', connected:'LISTO', transmitting:'TRANSMITIENDO', receiving:'ESCUCHANDO...' };
  statusDot.style.background = colors[s] || '#555';
  statusTxt.style.color = colors[s] || '#555';

  if (s === 'receiving' && currentSpeaker) {
    statusTxt.textContent = `HABLANDO: ${currentSpeaker.toUpperCase()}`;
  } else {
    statusTxt.textContent = labels[s] || s.toUpperCase();
  }

  ptt.className = s === 'transmitting' ? 'transmitting' : s === 'receiving' ? 'receiving' : s === 'connected' ? 'connected' : '';
  const active = s === 'transmitting' || s === 'receiving';
  const ringColor = s === 'transmitting' ? '#FF5252' : '#4CAF50';
  [ring1, ring2, ring3].forEach(r => {
    r.classList.toggle('active', active);
    r.style.color = active ? ringColor : 'transparent';
  });

  if (s === 'connected')         pttHint.textContent = 'PRESIONA PARA HABLAR';
  else if (s === 'transmitting') pttHint.textContent = 'SUELTA PARA TERMINAR';
  else if (s === 'receiving' && currentSpeaker) pttHint.textContent = `${currentSpeaker.toUpperCase()} ESTÁ HABLANDO`;
  else if (s === 'receiving')    pttHint.textContent = 'ESCUCHANDO...';
  else                           pttHint.textContent = '';
}

function updateUsers(count) {
  userCount = count;
  userCountEl.textContent = count;
  userCountEl.style.color = count > 1 ? '#4CAF50' : '#666';
  footerEl.textContent = count === 1 ? 'Solo tú en la sala' : `${count} usuarios conectados`;
}

// WebSocket
function connect(room, password, name) {
  setState('connecting');
  const params = [`name=${encodeURIComponent(name)}`];
  if (password) params.push(`password=${encodeURIComponent(password)}`);
  ws = new WebSocket(`${WS_BASE}/${room}?${params.join('&')}`);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => setState('connected');

  ws.onmessage = (ev) => {
    if (ev.data instanceof ArrayBuffer) {
      if (!muted && state !== 'transmitting') {
        setState('receiving');
        playPcm(new Int16Array(ev.data));
        setTimeout(() => { if (state === 'receiving') { currentSpeaker = null; setState('connected'); renderUsers(); } }, 300);
      }
      return;
    }
    try {
      const msg = JSON.parse(ev.data);
      if (msg.type === 'welcome') {
        updateUsers(msg.count);
        users = msg.users || [];
        renderUsers();
      } else if (msg.type === 'user_joined') {
        updateUsers(msg.count);
        if (msg.name && !users.includes(msg.name)) users.push(msg.name);
        renderUsers();
      } else if (msg.type === 'user_left') {
        updateUsers(msg.count);
        users = users.filter(u => u !== msg.name);
        if (currentSpeaker === msg.name) currentSpeaker = null;
        renderUsers();
      } else if (msg.type === 'ptt_start') {
        currentSpeaker = msg.name || null;
        if (state !== 'transmitting') setState('receiving');
        renderUsers();
      } else if (msg.type === 'ptt_end') {
        currentSpeaker = null;
        if (state === 'receiving') setState('connected');
        renderUsers();
      } else if (msg.type === 'error') {
        reconnectAllowed = false;
        ws.close();
        leaveRoom();
        showToast('Sala nueva — se requiere contraseña de administrador para crearla');
      }
    } catch(_) {}
  };

  ws.onclose = () => {
    setState('disconnected');
    users = [];
    currentSpeaker = null;
    renderUsers();
    if (reconnectAllowed && radioEl.style.display !== 'none') {
      setTimeout(() => connect(room, password, name), 3000);
    }
  };

  ws.onerror = () => ws.close();
}

// Audio
function getAudioCtx() {
  if (!audioCtx || audioCtx.state === 'closed') {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
    gainNode = audioCtx.createGain();
    gainNode.gain.value = volume;
    gainNode.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playPcm(int16Samples) {
  const ctx = getAudioCtx();
  const float32 = new Float32Array(int16Samples.length);
  for (let i = 0; i < int16Samples.length; i++) float32[i] = int16Samples[i] / 32768;
  const buf = ctx.createBuffer(1, float32.length, SAMPLE_RATE);
  buf.copyToChannel(float32, 0);
  const src = ctx.createBufferSource();
  src.buffer = buf;
  src.connect(gainNode);
  const now = ctx.currentTime;
  const startAt = Math.max(now, playTime);
  src.start(startAt);
  playTime = startAt + buf.duration;
}

async function startRecording() {
  const ctx = getAudioCtx();
  mediaStream = await navigator.mediaDevices.getUserMedia({ audio: {
    sampleRate: SAMPLE_RATE, channelCount: 1, echoCancellation: true, noiseSuppression: true
  }});
  const src = ctx.createMediaStreamSource(mediaStream);
  scriptProcessor = ctx.createScriptProcessor(2048, 1, 1);
  scriptProcessor.onaudioprocess = (e) => {
    if (!transmitting || !ws || ws.readyState !== WebSocket.OPEN) return;
    const f32 = e.inputBuffer.getChannelData(0);
    const int16 = new Int16Array(f32.length);
    for (let i = 0; i < f32.length; i++) int16[i] = Math.max(-32768, Math.min(32767, f32[i] * 32768));
    ws.send(int16.buffer);
  };
  src.connect(scriptProcessor);
  scriptProcessor.connect(ctx.destination);
}

function stopRecording() {
  scriptProcessor?.disconnect(); scriptProcessor = null;
  mediaStream?.getTracks().forEach(t => t.stop()); mediaStream = null;
}

// PTT
async function onPttDown() {
  if (state !== 'connected') return;
  transmitting = true;
  setState('transmitting');
  ws?.send(JSON.stringify({ type: 'ptt_start' }));
  await startRecording();
}
function onPttUp() {
  if (!transmitting) return;
  transmitting = false;
  stopRecording();
  ws?.send(JSON.stringify({ type: 'ptt_end' }));
  setState('connected');
}
ptt.addEventListener('pointerdown',  (e) => { e.preventDefault(); onPttDown(); });
ptt.addEventListener('pointerup',    (e) => { e.preventDefault(); onPttUp(); });
ptt.addEventListener('pointercancel',(e) => { e.preventDefault(); onPttUp(); });
ptt.addEventListener('pointerleave', (e) => { if (transmitting) { e.preventDefault(); onPttUp(); } });

// Volume
volumeSlider.addEventListener('input', () => {
  volume = volumeSlider.value / 100;
  volumePct.textContent = `${volumeSlider.value}%`;
  if (gainNode) gainNode.gain.value = volume;
});

// Join / Leave
function enterRoom(room, password, name) {
  roomCode = room; roomPassword = password; myName = name;
  reconnectAllowed = true;
  displayRoom.textContent = roomCode;
  joinEl.style.display = 'none';
  radioEl.style.display = 'flex';
  playTime = 0;
  connect(roomCode, roomPassword, myName);
  localStorage.setItem('last_room', roomCode);
  localStorage.setItem('user_name', name);
  otaBanner.classList.remove('visible');
  checkOta();
  clearInterval(otaCheckInterval);
  otaCheckInterval = setInterval(checkOta, 5 * 60 * 1000);
}

function leaveRoom() {
  reconnectAllowed = false;
  transmitting = false;
  stopRecording();
  ws?.close(); ws = null;
  users = []; currentSpeaker = null;
  setState('disconnected');
  clearInterval(otaCheckInterval);
  otaBanner.classList.remove('visible');
  radioEl.style.display = 'none';
  joinEl.style.display = 'flex';
}

// Exit confirm
function showExitConfirm() {
  document.getElementById('dialog-msg').textContent =
    `Hay ${userCount} ${userCount === 1 ? 'usuario' : 'usuarios'} en la sala. ¿Confirmas que quieres salir?`;
  overlay.classList.add('visible');
}
document.getElementById('btn-cancel').addEventListener('click', () => overlay.classList.remove('visible'));
document.getElementById('btn-confirm-exit').addEventListener('click', () => { overlay.classList.remove('visible'); leaveRoom(); });
btnBack.addEventListener('click', () => { if (userCount > 1 || state === 'connected') showExitConfirm(); else leaveRoom(); });

// Mute
btnMute.addEventListener('click', () => {
  muted = !muted;
  btnMute.textContent = muted ? '🔇' : '🔊';
  btnMute.classList.toggle('muted', muted);
});

// Join
btnJoin.addEventListener('click', () => {
  const name = nameInput.value.trim();
  if (!name) { showToast('Ingresa tu nombre para continuar'); return; }
  const code = roomInput.value.trim().toUpperCase().replace(/[^A-Z0-9]/g, '');
  if (!code) return;
  const password = passwordWrap.classList.contains('visible') ? passwordInput.value.trim() : '';
  enterRoom(code, password, name);
});
nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') roomInput.focus(); });
roomInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { passwordWrap.classList.contains('visible') ? passwordInput.focus() : btnJoin.click(); }
});
passwordInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') btnJoin.click(); });

// Restore prefs
nameInput.value = localStorage.getItem('user_name') || '';
roomInput.value = localStorage.getItem('last_room') || DEFAULT_ROOM;
updatePasswordVisibility();

// OTA check al cargar (actualiza link de descarga en join screen)
checkOta();

document.addEventListener('touchmove', e => { if (e.target === ptt) e.preventDefault(); }, { passive: false });
</script>
