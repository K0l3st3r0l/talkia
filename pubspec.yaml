name: talkia
description: "TalkIA — Walkie-talkie app con Flutter"
publish_to: 'none'

version: 1.0.1+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  record: ^5.1.2
  just_audio: ^0.9.40
  web_socket_channel: ^3.0.1
  flutter_foreground_task: ^8.14.0
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2
  open_filex: ^4.7.0
  package_info_plus: ^8.1.2
  path_provider: ^2.1.4
  dio: ^5.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

dependency_overrides:
  record_linux: ^1.3.0

flutter:
  uses-material-design: true
