name: talkia
description: "TalkIA — Walkie-talkie app con Flutter"
publish_to: 'none'

version: 1.0.20+20

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  record: ^5.1.2
  web_socket_channel: ^3.0.1
  flutter_foreground_task: ^8.14.0
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2
  open_filex: ^4.7.0
  package_info_plus: ^8.1.2
  path_provider: ^2.1.4
  dio: ^5.7.0
  connectivity_plus: ^6.1.4
  opus_dart: ^3.0.1
  opus_flutter: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 26
  adaptive_icon_background: "#0A0A0F"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter_native_splash:
  color: "#0A0A1A"
  image: assets/icon/icon.png
  android: true
  ios: false
  android_12:
    color: "#0A0A1A"
    image: assets/icon/icon.png
    icon_background_color: "#0A0A1A"

dependency_overrides:
  record_linux: ^1.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/splash/
